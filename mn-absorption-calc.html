<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合金元素吸收率计算器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0e14;
    --panel: #111720;
    --border: #1e2d40;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #c8d8e8;
    --text-dim: #4a6278;
    --glow: 0 0 20px rgba(0, 212, 255, 0.3);
    --input-bg: #0d1620;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Corner decorations */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 10%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,107,53,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 520px;
    padding: 0 16px;
    animation: fadeIn 0.8s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    margin-bottom: 28px;
    position: relative;
  }

  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header-line {
    margin-top: 14px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), rgba(0,212,255,0.1), transparent);
  }

  /* Card */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  /* Corner brackets */
  .card::after {
    content: '';
    position: absolute;
    bottom: 12px; right: 12px;
    width: 16px; height: 16px;
    border-right: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
  }

  /* Input groups */
  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  .field .unit {
    font-size: 10px;
    color: var(--accent);
    opacity: 0.7;
    margin-left: 4px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  .input-wrap input::-webkit-outer-spin-button,
  .input-wrap input::-webkit-inner-spin-button {
    -webkit-appearance: none;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  /* Fixed values section */
  .fixed-section {
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px 16px;
    margin-bottom: 22px;
    background: rgba(0,0,0,0.2);
    position: relative;
  }

  .fixed-section-title {
    position: absolute;
    top: -9px; left: 12px;
    background: var(--panel);
    padding: 0 8px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
  }

  .fixed-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 20px;
  }

  .fixed-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }

  .fixed-row .label {
    color: var(--text-dim);
    font-size: 11px;
  }

  .fixed-row .value {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    font-size: 13px;
  }

  /* Calc button */
  .calc-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
    margin-bottom: 20px;
  }

  .calc-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .calc-btn:hover::before { opacity: 0.1; }
  .calc-btn:active::before { opacity: 0.2; }

  .calc-btn:hover {
    box-shadow: var(--glow);
  }

  .calc-btn span { position: relative; z-index: 1; }

  /* Result */
  .result-panel {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .result-panel.active {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .result-panel::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .result-panel.active::before { opacity: 1; }

  .result-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1.5;
  }

  .result-label em {
    display: block;
    font-style: normal;
    color: var(--text);
    font-size: 13px;
    margin-top: 2px;
  }

  .result-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 38px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    transition: all 0.3s;
    min-width: 120px;
    text-align: right;
  }

  .result-value.idle {
    color: var(--text-dim);
    font-size: 28px;
  }

  /* Formula hint */
  .formula-box {
    margin-top: 16px;
    padding: 10px 14px;
    background: rgba(0,212,255,0.03);
    border-left: 2px solid rgba(0,212,255,0.2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.8;
    letter-spacing: 0.5px;
  }

  .formula-box strong {
    color: var(--accent);
    font-weight: 400;
  }

  /* Step display */
  .steps {
    margin-top: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    display: none;
    line-height: 2;
  }

  .steps.show { display: block; }
  .steps .step-val { color: var(--accent2); }

  /* Error */
  .error-msg {
    margin-top: 10px;
    font-size: 11px;
    color: #ff4d4d;
    font-family: 'Share Tech Mono', monospace;
    display: none;
  }
  .error-msg.show { display: block; }

</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-tag">Metallurgy · Steel · Analysis</div>
    <h1>合金元素<span>吸收率</span>计算器</h1>
    <div class="header-line"></div>
  </div>

  <div class="card">
    <!-- Inputs -->
    <div class="input-grid">
      <div class="field">
        <label>实际 Mn 成分<span class="unit">%</span></label>
        <div class="input-wrap">
          <input type="number" id="spec" step="0.01" placeholder="1.3">
        </div>
      </div>
      <div class="field">
        <label>终点残余成分<span class="unit">%</span></label>
        <div class="input-wrap">
          <input type="number" id="residual" step="0.01" placeholder="0.1">
        </div>
      </div>
      <div class="field">
        <label>合金加入量<span class="unit">kg/炉</span></label>
        <div class="input-wrap">
          <input type="number" id="alloyAdded" step="1" placeholder="3200">
        </div>
      </div>
      <div class="field">
        <label>实际装量<span class="unit">t</span></label>
        <div class="input-wrap">
          <input type="number" id="charge" step="0.1" placeholder="180">
        </div>
      </div>
    </div>

    <!-- Fixed values -->
    <div class="fixed-section">
      <span class="fixed-section-title">FIXED PARAMS</span>
      <div class="fixed-grid">
        <div class="fixed-row">
          <span class="label">出钢系数</span>
          <span class="value">× 0.91</span>
        </div>
        <div class="fixed-row">
          <span class="label">铁合金元素含量</span>
          <span class="value">0.66 %</span>
        </div>
      </div>
    </div>

    <!-- Button -->
    <button class="calc-btn" onclick="calculate()">
      <span>▶ &nbsp;开始计算</span>
    </button>

    <!-- Result -->
    <div class="result-panel" id="resultPanel">
      <div class="result-label">
        合金元素吸收率
        <em id="tapLabel">出钢量 — t</em>
      </div>
      <div class="result-value idle" id="resultValue">— %</div>
    </div>

    <div class="error-msg" id="errorMsg">⚠ 请检查输入值，所有字段须为有效正数</div>

    <!-- Steps -->
    <div class="steps" id="steps"></div>

    <!-- Formula -->
    <div class="formula-box">
      <strong>公式：</strong>吸收率% = (实际Mn成分% − 残余%) × 1000 × 出钢量<br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;÷ 铁合金元素含量% ÷ 合金加入量
    </div>
  </div>
</div>

<script>
  // Auto-calculate on input change
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('input', () => {
      if ([...document.querySelectorAll('input')].every(i => i.value !== '')) {
        calculate();
      }
    });
  });

  function calculate() {
    const spec       = parseFloat(document.getElementById('spec').value);
    const residual   = parseFloat(document.getElementById('residual').value);
    const alloyAdded = parseFloat(document.getElementById('alloyAdded').value);
    const charge     = parseFloat(document.getElementById('charge').value);

    const panel  = document.getElementById('resultPanel');
    const resEl  = document.getElementById('resultValue');
    const stepsEl= document.getElementById('steps');
    const errEl  = document.getElementById('errorMsg');
    const tapLbl = document.getElementById('tapLabel');

    if (isNaN(spec) || isNaN(residual) || isNaN(alloyAdded) || isNaN(charge) ||
        alloyAdded <= 0 || charge <= 0) {
      errEl.classList.add('show');
      panel.classList.remove('active');
      resEl.textContent = '— %';
      resEl.className = 'result-value idle';
      stepsEl.classList.remove('show');
      return;
    }

    errEl.classList.remove('show');

    const tapWeight  = charge * 0.91;           // 出钢量
    const alloyContent = 0.66;                  // 铁合金元素含量%

    const numerator   = (spec - residual) * 1000 * tapWeight;
    const denominator = alloyContent * alloyAdded;
    const result      = numerator / denominator;

    tapLbl.textContent = `出钢量 ${tapWeight.toFixed(2)} t`;

    resEl.textContent = result.toFixed(2) + ' %';
    resEl.className = 'result-value';
    panel.classList.add('active');

    // Steps
    stepsEl.innerHTML =
      `① 出钢量 = ${charge} × 0.91 = <span class="step-val">${tapWeight.toFixed(3)} t</span><br>` +
      `② 分子 = (${spec} − ${residual}) × 1000 × ${tapWeight.toFixed(3)} = <span class="step-val">${numerator.toFixed(2)}</span><br>` +
      `③ 分母 = ${alloyContent} × ${alloyAdded} = <span class="step-val">${denominator.toFixed(2)}</span><br>` +
      `④ 吸收率 = ${numerator.toFixed(2)} ÷ ${denominator.toFixed(2)} = <span class="step-val">${result.toFixed(2)} %</span>`;
    stepsEl.classList.add('show');
  }

  // Initial calculation
  calculate();
</script>
</body>
</html>
